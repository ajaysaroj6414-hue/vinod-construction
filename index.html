  background:white;

.whatsapp {
  position:fixed;

  left:20px;
  background:green;

<script>
function calculate() {
  let service = document.getElementById("service").value;
  let ac = document.getElementById("ac").value;
  let qty = document.getElementById("qty").value;

  let price = 0;

  if(service=="AMC") {
    if(ac=="compressor") price=1800;
    else price=1200;
  }
  if(service=="Gas") price=2500;
  if(service=="Repair") price=500;

  let total = price * qty;
  document.getElementById("result").innerHTML = "Total: ₹"+total;
}
</script>

<body>

<header>
<h1>Vinod Construction & Supply</h1>
<p>Mumbai & Gujarat AC Services</p>
</header>

<div class="hero">
<h2>Fast AC Repair & AMC Services</h2>

</div>

<section>
<h2>Our Services</h2>

<div class="card">AC Repair</div>
<div class="card">AMC Contract</div>
<div class="card">Gas Charging</div>
<div class="card">Installation</div>

</section>

<section>
<h2>Get Instant Price</h2>

<select id="service">
<option>AMC</option>
<option>Repair</option>
<option>Gas</option>
</select>

<select id="ac">
<option value="compressor">Compressor</option>
<option value="non">Non Compressor</option>
</select>

<input id="qty" placeholder="Number of AC">

<button onclick="calculate()">Calculate Price</button>

<div id="result"></div>

</section>
